name: CI

on:
  push:
    branches:
      - "main"
  pull_request:
    branches:
      - "main"

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.13']
        include:
        - os: ubuntu-latest
          path: ~/.cache/pip
        - os: macos-latest
          path: ~/Library/Caches/pip
        - os: windows-latest
          path: ~\AppData\Local\pip\Cache
    defaults:
      run:
        shell: bash

    runs-on: ${{ matrix.os }}
    env:
      PYTHONIOENCODING: UTF-8
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v6
      - run: make check
      - run: make synth-check
      - run: make tests

      - uses: codecov/codecov-action@v5
        with:
          file: coverage.xml
          name: coverage-${{ matrix.os }}-${{ matrix.python-version }}-${{ matrix.cython }}
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true
